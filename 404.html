<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Outfit',sans-serif;
  background:linear-gradient(135deg, #0c1929 0%, #0f2338 40%, #0a1628 100%);
  color:white;min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:40px 24px;
  -webkit-font-smoothing:antialiased;
  position:relative;overflow:hidden;

body::before{

  pointer-events:none;
}
body::after{
  content:'';position:absolute;bottom:10%;left:10%;width:400px;height:400px;

  pointer-events:none;

.content{position:relative;z-index:2;max-width:480px}

  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;
  opacity:0.25;
}
h1{
  font-size:1.8rem;font-weight:800;
  letter-spacing:-0.03em;margin-bottom:12px;
}
p{
  font-size:1rem;color:rgba(255,255,255,0.5);
  line-height:1.7;margin-bottom:36px;
}
.back-btn{
  display:inline-flex;align-items:center;gap:8px;
  background:#2563eb;color:white;padding:14px 32px;
  border-radius:10px;font-size:0.9rem;font-weight:600;
  text-decoration:none;transition:all 0.3s;
  font-family:'Outfit',sans-serif;
}
.back-btn:hover{background:#3b82f6;transform:translateY(-2px);box-shadow:0 8px 30px rgba(37,99,235,0.25)}
.logo{
